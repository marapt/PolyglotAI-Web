<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #FAFAFA;
    }
    .header {
      background: #4F46E5;
      color: white;
      padding: 16px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 700;
    }
    .header p {
      font-size: 11px;
      opacity: 0.8;
      margin-top: 2px;
    }
    .body { padding: 16px; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #6B7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }
    input, select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #E5E7EB;
      border-radius: 10px;
      font-size: 13px;
      color: #1F2937;
      margin-bottom: 12px;
      font-family: inherit;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #4F46E5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
    }
    button {
      width: 100%;
      padding: 10px;
      background: #4F46E5;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    button:hover { background: #4338CA; }
    .status {
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      display: none;
    }
    .status.success { display: block; background: #ECFDF5; color: #059669; }
    .status.error { display: block; background: #FEF2F2; color: #DC2626; }
    .footer {
      padding: 8px 16px;
      border-top: 1px solid #E5E7EB;
      text-align: center;
    }
    .footer a {
      font-size: 10px;
      color: #9CA3AF;
      text-decoration: none;
    }
    .footer a:hover { color: #4F46E5; }
  </style>
</head>
<body>
  <div class="header">
    <h1>PolyglotAI Translator</h1>
    <p>Select text on any page to translate</p>
  </div>
  <div class="body">
    <label>API URL</label>
    <input id="apiUrl" placeholder="https://your-app.com/api" />

    <label>API Key</label>
    <input id="apiKey" type="password" placeholder="pk_..." />

    <label>Target Language</label>
    <select id="targetLang">
      <option value="en">English</option>
      <option value="es">Spanish</option>
      <option value="fr">French</option>
      <option value="de">German</option>
      <option value="zh">Chinese</option>
      <option value="ja">Japanese</option>
      <option value="ko">Korean</option>
      <option value="ar">Arabic</option>
      <option value="hi">Hindi</option>
      <option value="pt">Portuguese</option>
      <option value="ru">Russian</option>
      <option value="it">Italian</option>
    </select>

    <button id="save">Save Settings</button>
    <div class="status" id="status"></div>
  </div>
  <div class="footer">
    <a href="#">Powered by PolyglotAI</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
